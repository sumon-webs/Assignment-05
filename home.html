<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Daisy ui and Tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font awesome cdn -->
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <title>Issue tracker</title>
</head>

<body class=" bg-base-200 overflow-x-hidden">
    <img src="." alt="">
    <!-- Navbar -->
    <nav class="bg-base-100 shadow-sm p-4 md:p-0">
        <div class="md:navbar space-y-5 flex flex-col max-w-screen-2xl mx-auto ">
            <div class="flex-1 flex space-x-3">
                <div><img class=" w-9 h-9" src="./assets/github-logo.png" alt=""></div>
                <a class=" text-xl font-semibold">GitHub Issues Tracker</a>
            </div>
            <div class="md:flex gap-2 space-y-4 md:space-y-0">
                <div class=" flex">
                    <input id="input-text" type="text" placeholder="Search"
                        class="input input-bordered w-full md:w-auto " />
                    <button id="search-btn" class="btn">Search</button>
                </div>
                <div class="dropdown dropdown-end flex justify-center">
                    <button class="btn btn-primary">+ New Issue</button>
                </div>
            </div>
        </div>
    </nav>
    <section class="">
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
            <div id="modal-box" class="modal-box space-y-3">

            </div>
        </dialog>
    </section>
    <main class=" max-w-screen-xl mx-auto">
        <section>
            <div class=" bg-white shadow-sm rounded-sm mt-6 p-3 space-x-3">
                <button onclick="activeStatus('all-btn')" id="all-btn" class=" btn btn-primary px-10 ">All</button>
                <button onclick="activeStatus('open-btn')" id="open-btn" class=" btn px-10">Open</button>
                <button onclick="activeStatus('closed-btn')" id="closed-btn" class=" btn px-10">Closed</button>
            </div>
        </section>



        <section class=" bg-gray-50 mt-5 shadow-sm">
            <div class=" bg-base-100 shadow-sm md:flex space-y-4 justify-between p-4 rounded-sm">
                <div class=" flex gap-2">
                    <div class=" flex justify-center items-center"><img class="" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <p class=" text-2xl font-bold"><span id="issue-count">0</span> Issues</p>
                        <p class=" text-gray-500"> Track and manage your project issues</p>
                    </div>
                </div>
                <div class=" flex gap-2 justify-center">
                    <p><i class="fa-solid fa-circle text-green-500"></i> Open</p>
                    <p><i class="fa-solid fa-circle text-purple-500"></i> Closed</p>
                </div>
            </div>
            <div id="snipper-section" class=" hidden flex justify-center py-9">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
            <div id="all-issues-container" class=" grid grid-cols-1  sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-3 gap-3">

            </div>
            <div id="all-open-container" class=" grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-3 gap-3 hidden">

            </div>
            <div id="all-closed-container" class=" grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 p-3 gap-3 hidden">

            </div>
        </section>


    </main>

    <script src="./JS/home.js"></script>
</body>

</html>
